<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Explore a responsive temple album with filtering options for old, new, large, and small temples.">
  <meta name="author" content="Ukeje Frank Chika">

  <title>Temple Album</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles/filtered-temple.css">
  <link rel="stylesheet" href="styles/filtered-temple-large.css">

<body>

  <div class="top-bar">
    <h1>Temple Album</h1>
    <button id="menuBtn" aria-label="Toggle navigation menu">☰</button>
  </div>

  <!-- Use buttons instead of empty links -->
  <nav id="navMenu">
    <a href="#">Home</a>
    <a href="#">Old</a>
    <a href="#">New</a>
    <a href="#">Large</a>
    <a href="#">Small</a>
  </nav>

<main>
  <h2>Temple Gallery</h2>

  <!-- Accessibility improvement -->
  <div id="filterInfo" class="filter-info" aria-live="polite"></div>

</main>

<footer>
  <p>&copy; <span id="year"></span> | Ukeje Frank Chika | Abuja, Nigeria</p>
